name: nettio

# Hardening notes
#   - security_opt: no-new-privileges:true  on every service — blocks setuid
#     escalation inside the container.
#   - cap_drop: [ALL]  on services that don't need any Linux capabilities; a
#     narrow cap_add list elsewhere. Edge nginx keeps default caps because
#     binding 80/443 from root-owned master needs NET_BIND_SERVICE and the
#     privileged container handles that implicitly.
#   - mem_limit / cpus  prevent any single service from OOM-killing its
#     neighbours on a shared Contabo VPS.
services:
  # Nginx Reverse Proxy with SSL
  nginx:
    image: nginx:1.27-alpine
    container_name: nettio-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
      - /home/deploy/nettio/landing:/var/www/nettio:ro
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    cpus: 0.5
    restart: unless-stopped

  # Certbot for SSL certificates
  certbot:
    image: certbot/certbot
    container_name: nettio-certbot
    volumes:
      - ./deploy/certbot/conf:/etc/letsencrypt
      - ./deploy/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    cpus: 0.25
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:16
    container_name: nettio-notes-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    # Postgres needs a few caps (shm, setgid) — leave default cap set.
    mem_limit: 1g
    cpus: 2.0
    restart: unless-stopped

  # Keycloak Authentication
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: nettio-auth
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD required}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-postgres}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      KC_HOSTNAME: https://notes.nettio.eu
      KC_HOSTNAME_ADMIN: https://auth.nettio.eu
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
    command: start --import-realm
    volumes:
      - ./notes-prod-realm.json:/opt/keycloak/data/import/notes-realm.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    # JVM needs a reasonable allotment; heap grows to 70% of this by default.
    mem_limit: 1g
    cpus: 2.0
    restart: unless-stopped

  # .NET API — runs as UID 1654 ('app' user) after the Dockerfile hardening.
  api:
    image: ghcr.io/${GITHUB_REPOSITORY:-local}/api:latest
    container_name: nettio-notes-api
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=notes;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}"
      Keycloak__Authority: "http://keycloak:8080/realms/notes"
      Keycloak__Issuer: "https://notes.nettio.eu/realms/notes"
      ASPNETCORE_ENVIRONMENT: Production
      FileStorage__UploadDirectory: "/app/uploads"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    cpus: 1.0
    restart: unless-stopped

  # Frontend — nginxinc/nginx-unprivileged runs as UID 101 and listens on 8080.
  # Edge nginx proxies to frontend:8080.
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY:-local}/frontend:latest
    container_name: nettio-notes-frontend
    environment:
      API_URL: "https://notes.nettio.eu"
      KEYCLOAK_URL: "https://notes.nettio.eu"
      KEYCLOAK_REALM: "notes"
      KEYCLOAK_CLIENT_ID: "notes-frontend"
    depends_on:
      - api
      - keycloak
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 128m
    cpus: 0.5
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
