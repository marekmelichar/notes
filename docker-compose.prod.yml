name: nettio

services:
  # Nginx Reverse Proxy with SSL
  nginx:
    image: nginx:1.27-alpine
    container_name: nettio-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
      - /home/deploy/nettio/landing:/var/www/nettio:ro
    restart: unless-stopped

  # Certbot for SSL certificates
  certbot:
    image: certbot/certbot
    container_name: nettio-certbot
    volumes:
      - ./deploy/certbot/conf:/etc/letsencrypt
      - ./deploy/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:16
    container_name: nettio-notes-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Keycloak Authentication
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: nettio-auth
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD required}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-postgres}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      KC_HOSTNAME: https://notes.nettio.eu
      KC_HOSTNAME_ADMIN: https://auth.nettio.eu
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
    command: start --import-realm
    volumes:
      - ./notes-prod-realm.json:/opt/keycloak/data/import/notes-realm.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # .NET API
  api:
    image: ghcr.io/${GITHUB_REPOSITORY:-local}/api:latest
    container_name: nettio-notes-api
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=notes;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}"
      Keycloak__Authority: "http://keycloak:8080/realms/notes"
      Keycloak__Issuer: "https://notes.nettio.eu/realms/notes"
      ASPNETCORE_ENVIRONMENT: Production
      FileStorage__UploadDirectory: "/app/uploads"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    restart: unless-stopped

  # Frontend
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY:-local}/frontend:latest
    container_name: nettio-notes-frontend
    environment:
      API_URL: "https://notes.nettio.eu"
      KEYCLOAK_URL: "https://notes.nettio.eu"
      KEYCLOAK_REALM: "notes"
      KEYCLOAK_CLIENT_ID: "notes-frontend"
    depends_on:
      - api
      - keycloak
    restart: unless-stopped

  # Nightly Postgres backup with off-host upload via rclone.
  # See deploy/backup/README.md for configuration (RCLONE_CONFIG_* env vars).
  postgres-backup:
    build:
      context: ./deploy/backup
      dockerfile: Dockerfile
    image: nettio-notes-backup:local
    container_name: nettio-notes-backup
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: notes
      PGUSER: ${POSTGRES_USER:-postgres}
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      BACKUP_CRON: ${BACKUP_CRON:-0 3 * * *}
      LOCAL_RETENTION_DAYS: ${BACKUP_LOCAL_RETENTION_DAYS:-7}
      RUN_ON_START: ${BACKUP_RUN_ON_START:-true}
      RCLONE_REMOTE: ${BACKUP_RCLONE_REMOTE:-}
      TZ: ${BACKUP_TZ:-UTC}
      # rclone config is provided via RCLONE_CONFIG_* env vars in .env on the
      # host; no rclone.conf file is mounted. See deploy/backup/README.md.
      RCLONE_CONFIG_NOTES_TYPE: ${RCLONE_CONFIG_NOTES_TYPE:-}
      RCLONE_CONFIG_NOTES_PROVIDER: ${RCLONE_CONFIG_NOTES_PROVIDER:-}
      RCLONE_CONFIG_NOTES_ACCESS_KEY_ID: ${RCLONE_CONFIG_NOTES_ACCESS_KEY_ID:-}
      RCLONE_CONFIG_NOTES_SECRET_ACCESS_KEY: ${RCLONE_CONFIG_NOTES_SECRET_ACCESS_KEY:-}
      RCLONE_CONFIG_NOTES_ENDPOINT: ${RCLONE_CONFIG_NOTES_ENDPOINT:-}
      RCLONE_CONFIG_NOTES_REGION: ${RCLONE_CONFIG_NOTES_REGION:-}
      RCLONE_CONFIG_NOTES_ACL: ${RCLONE_CONFIG_NOTES_ACL:-}
      RCLONE_CONFIG_NOTES_ACCOUNT: ${RCLONE_CONFIG_NOTES_ACCOUNT:-}
      RCLONE_CONFIG_NOTES_KEY: ${RCLONE_CONFIG_NOTES_KEY:-}
      RCLONE_CONFIG_NOTES_HARD_DELETE: ${RCLONE_CONFIG_NOTES_HARD_DELETE:-}
    volumes:
      - backups_data:/backups
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
  backups_data:
