events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ---- Shared TLS defaults (applied per server block) ----
    # TLS 1.2 + 1.3 only; modern AEAD ciphers. See security-headers.conf for
    # response headers.
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Hide nginx version from error pages / Server header.
    server_tokens off;

    # ---- HTTP :80 — redirect to HTTPS, but keep ACME-HTTP-01 challenge path ----
    server {
        listen 80;
        server_name nettio.eu www.nettio.eu notes.nettio.eu auth.nettio.eu;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---- nettio.eu landing ----
    server {
        listen 443 ssl;
        http2 on;
        server_name nettio.eu www.nettio.eu;

        ssl_certificate /etc/letsencrypt/live/nettio.eu/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/nettio.eu/privkey.pem;

        include /etc/nginx/security-headers.conf;
        # Landing is a static marketing page — strict CSP, no script allowed.
        add_header Content-Security-Policy "default-src 'self'; script-src 'none'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests" always;

        location / {
            root /var/www/nettio;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }

    # ---- notes.nettio.eu — the SPA + API + Keycloak iframes ----
    server {
        listen 443 ssl;
        http2 on;
        server_name notes.nettio.eu;

        ssl_certificate /etc/letsencrypt/live/notes.nettio.eu/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/notes.nettio.eu/privkey.pem;

        include /etc/nginx/security-headers.conf;
        # CSP for the SPA.
        # - script-src 'self' only — Vite produces hashed, non-inline JS
        # - style-src needs 'unsafe-inline' because Emotion / MUI inject inline
        #   <style> tags at runtime
        # - img-src allows data:/blob:/https: so TipTap pasted images, drag-drop
        #   blobs, and data-URI icons all work
        # - worker-src 'self' blob: for the Workbox PWA service worker
        # - connect-src 'self' covers same-origin /api/, /realms/, /resources/
        # - frame-src 'self' covers Keycloak silent-SSO iframes (all same-origin
        #   via nginx proxy)
        # - frame-ancestors 'none' replaces X-Frame-Options: DENY
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self'; worker-src 'self' blob:; manifest-src 'self'; frame-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests" always;

        location / {
            set $frontend_upstream http://frontend:80;
            proxy_pass $frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            set $api_upstream http://api:8080;
            client_max_body_size 101m;
            proxy_pass $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /realms/ {
            set $keycloak_upstream http://keycloak:8080;
            proxy_pass $keycloak_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }

        location /resources/ {
            set $keycloak_upstream http://keycloak:8080;
            proxy_pass $keycloak_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /js/ {
            set $keycloak_upstream http://keycloak:8080;
            proxy_pass $keycloak_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ---- auth.nettio.eu — Keycloak admin console ----
    # No custom CSP: Keycloak ships its own and our edge shouldn't override it.
    # Baseline security headers + HSTS still apply.
    server {
        listen 443 ssl;
        http2 on;
        server_name auth.nettio.eu;

        ssl_certificate /etc/letsencrypt/live/auth.nettio.eu/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/auth.nettio.eu/privkey.pem;

        include /etc/nginx/security-headers.conf;

        location / {
            set $keycloak_upstream http://keycloak:8080;
            proxy_pass $keycloak_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }
    }
}
