# Shared security-header snippet for nettio.eu / notes.nettio.eu.
# Include inside an `ssl` server { } block. All headers use `always` so they
# are sent even on error responses (4xx/5xx).
#
# Nginx gotcha: `add_header` in a location block silently replaces the *entire*
# server-level add_header set. If you introduce add_header inside a location,
# re-include this file there too. Locations that only use proxy_set_header are
# unaffected — those write upstream request headers, not client response
# headers.

# ---- HTTPS enforcement ----
# 63072000s = 2 years. includeSubDomains covers auth.nettio.eu and any future
# subdomain. preload is set so nettio.eu can be submitted to
# https://hstspreload.org once the team is ready — the directive itself is
# harmless before submission.
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# ---- Framing / clickjacking ----
# CSP frame-ancestors is the modern replacement for X-Frame-Options, but
# keep X-FO too for legacy clients. `frame-ancestors 'none'` is enforced in
# the per-site CSP below.
add_header X-Frame-Options "DENY" always;

# ---- MIME sniffing ----
add_header X-Content-Type-Options "nosniff" always;

# ---- Referrer ----
# Strict on cross-origin, keep full on same-origin so server-side analytics
# (if any) still see the path within the app.
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ---- Process isolation ----
# COOP isolates this document's browsing context from popups (Spectre
# mitigation + secure cross-origin popups). CORP makes sub-resources loadable
# only by same-site documents; same-site is pragmatic — same-origin is too
# strict for a PWA that precaches assets from the start_url origin.
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-site" always;
# Cross-Origin-Embedder-Policy is intentionally NOT set — require-corp breaks
# pasted images in TipTap unless every upstream serves CORP headers.

# ---- Permissions-Policy ----
# Opt out of every feature this app does not need. Prevents third-party code
# (or a future rogue dep) from quietly reading the camera, starting payment
# flows, etc. Add to this list when adding features, don't remove entries.
add_header Permissions-Policy "accelerometer=(), ambient-light-sensor=(), autoplay=(), battery=(), camera=(), display-capture=(), document-domain=(), encrypted-media=(), execution-while-not-rendered=(), execution-while-out-of-viewport=(), fullscreen=(self), gamepad=(), geolocation=(), gyroscope=(), hid=(), identity-credentials-get=(), idle-detection=(), local-fonts=(), magnetometer=(), microphone=(), midi=(), otp-credentials=(), payment=(), picture-in-picture=(), publickey-credentials-create=(self), publickey-credentials-get=(self), screen-wake-lock=(), serial=(), storage-access=(), usb=(), web-share=(self), window-management=(), xr-spatial-tracking=()" always;
