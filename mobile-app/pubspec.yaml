name: notes_app
description: Mobile app for notes.nettio.eu
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  material_design_icons_flutter: ^7.0.7296
  google_fonts: ^6.2.1
  flutter_html: ^3.0.0-beta.2

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.7.0
  retrofit: ^4.4.1
  json_annotation: ^4.9.0

  # Auth
  flutter_appauth: ^7.0.1
  flutter_secure_storage: ^9.2.2

  # Navigation
  go_router: ^14.6.2

  # Rich text editing
  flutter_quill: ^10.8.5

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  timeago: ^3.7.0
  collection: ^1.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  retrofit_generator: ^9.1.5
  riverpod_generator: ^2.6.2

flutter:
  uses-material-design: true
