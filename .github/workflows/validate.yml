name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  docs:
    name: Docs validator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate documentation references
        run: node scripts/validate-docs.mjs
